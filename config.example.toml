[internet_archive]
# Required for --borrow mode. Options for providing credentials:
#
# 1) Email/password (recommended):
email = "your_email@example.com"
password = "your_password"
#
# 2) Or S3 keys directly (copied from ~/.config/ia.ini):
# s3_access = "your_s3_access_key"
# s3_secret = "your_s3_secret_key"
#
# 3) Or just run `ia configure` once and leave these blank —
#    the tool will read ~/.config/ia.ini automatically.

[loomfinder]
# Default search language filter
language = "english"
# Maximum retry attempts to find a suitable book
max_retries = 10
# Maximum concurrent requests to Internet Archive
rate_limit = 3
# Default number of words per snippet
default_num_words = 200
# Seconds to wait for "save author?" prompt before exiting (0 = no timeout)
save_author_timeout = 10
